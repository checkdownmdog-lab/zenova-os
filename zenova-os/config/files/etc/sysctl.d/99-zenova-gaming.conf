# ═══════════════════════════════════════════════════════════════
#  Zenova OS — Gaming Kernel Parameters
#  Optimized for low-latency gaming performance
# ═══════════════════════════════════════════════════════════════

# ── Virtual Memory ──
# Reduce swappiness (keep more in RAM for games)
vm.swappiness = 10
# Faster dirty page writeback
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
# Optimize for large memory workloads (games)
vm.vfs_cache_pressure = 50

# ── Network (reduce latency for online gaming) ──
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_mtu_probing = 1
# Enable BBR congestion control for better throughput
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# ── Scheduler ──
# Increase max map count (required by many games, especially via Proton)
vm.max_map_count = 2147483642

# ── Input Latency ──
# Reduce keyboard repeat delay
kernel.sched_autogroup_enabled = 1

# ── Security (balanced — don't break anti-cheat) ──
kernel.unprivileged_userns_clone = 1
