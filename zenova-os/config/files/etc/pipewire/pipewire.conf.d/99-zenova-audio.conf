context.properties = {
    # ── Zenova OS Ultralow Audio Latency ──
    # Forces PipeWire to use a base quantum of 128 on 48000Hz.
    # Yields exactly 2.6ms buffer latency (ideal for competitive shooters).
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 88200 96000 192000 ]
    default.clock.quantum       = 128
    default.clock.min-quantum   = 64
    default.clock.max-quantum   = 1024
}
